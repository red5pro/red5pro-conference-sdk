<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>09 – Guest Management | Red5 Pro Conference SDK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; padding: 24px; }
    h1 { font-size: 1.25rem; margin-bottom: 4px; }
    p.subtitle { color: #8b949e; font-size: 0.875rem; margin-bottom: 24px; }

    .config { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 640px; margin-bottom: 20px; }
    label { font-size: 0.8rem; color: #8b949e; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 10px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 0.875rem; }

    .row { display: flex; gap: 10px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: opacity .15s; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-join  { background: #238636; color: #fff; }
    #btn-leave { background: #da3633; color: #fff; }

    .layout { display: flex; gap: 16px; max-width: 900px; flex-wrap: wrap; }

    video { width: 240px; height: 135px; background: #161b22; border-radius: 8px; object-fit: cover; display: block; }

    .panel { flex: 1; min-width: 280px; }
    .panel h3 { font-size: 0.85rem; color: #8b949e; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .badge-count { background: #da3633; color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 0.72rem; }

    #waiting-list, #participants-list { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px; min-height: 100px; display: flex; flex-direction: column; gap: 6px; }

    .user-card { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: #21262d; border-radius: 6px; }
    .user-card .name { font-size: 0.875rem; }
    .user-card .role { font-size: 0.7rem; color: #8b949e; margin-top: 2px; }
    .card-actions { display: flex; gap: 6px; }
    .approve-btn { padding: 4px 10px; background: #238636; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
    .reject-btn  { padding: 4px 10px; background: #da3633; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
    .empty-hint  { font-size: 0.78rem; color: #484f58; text-align: center; padding: 20px 0; }

    #log { margin-top: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.78rem; max-width: 900px; }
    .log-info    { color: #8be9fd; }
    .log-success { color: #50fa7b; }
    .log-error   { color: #ff5555; }
    .log-warn    { color: #f0883e; }
  </style>
</head>
<body>
  <h1>09 – Guest Management</h1>
  <p class="subtitle">Host view: approve or reject guests waiting to join the conference room.</p>

  <div class="config">
    <div><label>Host</label><input id="host" placeholder="your-server.red5.net" /></div>
    <div><label>Room ID</label><input id="room-id" value="testroom" /></div>
    <div>
      <label>Your Role</label>
      <select id="role">
        <option value="publisher">Publisher (Host)</option>
        <option value="guest">Guest</option>
      </select>
    </div>
    <div><label>User ID</label><input id="user-id" placeholder="host" /></div>
    <div><label>Token (optional)</label><input id="token" /></div>
  </div>

  <div class="row">
    <button id="btn-join">Join Room</button>
    <button id="btn-leave" disabled>Leave Room</button>
  </div>

  <div class="layout">
    <video id="local-video" autoplay playsinline muted></video>

    <div class="panel">
      <h3>Waiting Room <span class="badge-count" id="waiting-count" style="display:none">0</span></h3>
      <div id="waiting-list">
        <div class="empty-hint">No guests waiting</div>
      </div>
    </div>

    <div class="panel">
      <h3>Participants</h3>
      <div id="participants-list">
        <div class="empty-hint">No other participants</div>
      </div>
    </div>
  </div>

  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/red5pro-webrtc-sdk@latest/red5pro-sdk.min.js"></script>
  <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.8.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/red5pro-conference-sdk@latest/red5pro-conference-sdk.min.js"></script>
  <script>
    const { ConferenceClient, ConferenceEvents } = red5proConferenceSdk;
    const $ = id => document.getElementById(id);

    let client = null;
    let localStream = null;
    const waitingGuests = new Map();
    const participants  = new Map();

    function log(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `log-${type}`;
      el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      $('log').appendChild(el);
      $('log').scrollTop = $('log').scrollHeight;
    }

    function renderWaiting() {
      const list = $('waiting-list');
      const badge = $('waiting-count');
      if (waitingGuests.size === 0) {
        list.innerHTML = '<div class="empty-hint">No guests waiting</div>';
        badge.style.display = 'none';
        return;
      }
      badge.style.display = '';
      badge.textContent = waitingGuests.size;
      list.innerHTML = '';
      waitingGuests.forEach((user, uid) => {
        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `
          <div><div class="name">${uid}</div><div class="role">Guest</div></div>
          <div class="card-actions">
            <button class="approve-btn" data-uid="${uid}">Approve</button>
            <button class="reject-btn"  data-uid="${uid}">Reject</button>
          </div>`;
        list.appendChild(card);
      });

      list.querySelectorAll('.approve-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const uid = btn.dataset.uid;
          try {
            await client.approveGuest(uid);
            waitingGuests.delete(uid);
            renderWaiting();
            log(`Approved guest: ${uid}`, 'success');
          } catch (err) {
            log(`Approve failed: ${err.message}`, 'error');
          }
        });
      });

      list.querySelectorAll('.reject-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const uid = btn.dataset.uid;
          try {
            await client.rejectGuest(uid);
            waitingGuests.delete(uid);
            renderWaiting();
            log(`Rejected guest: ${uid}`, 'warn');
          } catch (err) {
            log(`Reject failed: ${err.message}`, 'error');
          }
        });
      });
    }

    function renderParticipants() {
      const list = $('participants-list');
      if (participants.size === 0) {
        list.innerHTML = '<div class="empty-hint">No other participants</div>';
        return;
      }
      list.innerHTML = '';
      participants.forEach((user, uid) => {
        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `<div><div class="name">${uid}</div><div class="role">${user.role || 'publisher'}</div></div>`;
        list.appendChild(card);
      });
    }

    $('btn-join').addEventListener('click', async () => {
      const host   = $('host').value.trim();
      const roomId = $('room-id').value.trim();
      const userId = $('user-id').value.trim() || `user-${Date.now()}`;
      const role   = $('role').value;
      const token  = $('token').value.trim();

      if (!host) { log('Host is required', 'error'); return; }

      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        $('local-video').srcObject = localStream;

        client = new ConferenceClient({
          host,
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        client.addEventListener(ConferenceEvents.USER_PUBLISHED, () => {
          log(`Joined as ${role}`, 'success');
          $('btn-join').disabled  = true;
          $('btn-leave').disabled = false;
        });

        client.addEventListener(ConferenceEvents.GUEST_JOIN_REQUEST, e => {
          const user = e.detail;
          log(`Guest join request from: ${user?.uid}`, 'warn');
          waitingGuests.set(user.uid, user);
          renderWaiting();
        });

        client.addEventListener(ConferenceEvents.NEW_PARTICIPANT, e => {
          const user = e.detail;
          participants.set(user.uid, user);
          renderParticipants();
          log(`Participant joined: ${user.uid}`);
        });

        client.addEventListener(ConferenceEvents.PARTICIPANT_DISCONNECTED, e => {
          const user = e.detail;
          participants.delete(user.uid);
          waitingGuests.delete(user.uid);
          renderParticipants();
          renderWaiting();
          log(`Participant left: ${user.uid}`);
        });

        client.addEventListener(ConferenceEvents.ROOM_STATE_UPDATE, e => {
          const state = e.detail;
          if (state?.users) {
            state.users.forEach(u => {
              if (u.uid !== userId) participants.set(u.uid, u);
            });
            renderParticipants();
          }
        });

        log(`Joining as ${role}…`);
        await client.join(roomId, userId, token, role, localStream, true, true);
      } catch (err) {
        log(`Error: ${err.message}`, 'error');
      }
    });

    $('btn-leave').addEventListener('click', async () => {
      try {
        await client.leave();
        localStream?.getTracks().forEach(t => t.stop());
        $('local-video').srcObject = null;
        client = null; localStream = null;
        waitingGuests.clear(); participants.clear();
        renderWaiting(); renderParticipants();
        $('btn-join').disabled  = false;
        $('btn-leave').disabled = true;
        log('Left room');
      } catch (err) {
        log(`Leave error: ${err.message}`, 'error');
      }
    });
  </script>
</body>
</html>
