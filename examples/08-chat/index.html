<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>08 – Chat | Red5 Pro Conference SDK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; padding: 24px; }
    h1 { font-size: 1.25rem; margin-bottom: 4px; }
    p.subtitle { color: #8b949e; font-size: 0.875rem; margin-bottom: 24px; }

    .config { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 640px; margin-bottom: 20px; }
    label { font-size: 0.8rem; color: #8b949e; display: block; margin-bottom: 4px; }
    input { width: 100%; padding: 8px 10px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 0.875rem; }

    .row { display: flex; gap: 10px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: opacity .15s; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-join  { background: #238636; color: #fff; }
    #btn-leave { background: #da3633; color: #fff; }
    #btn-send  { background: #1f6feb; color: #fff; flex-shrink: 0; }

    .layout { display: flex; gap: 16px; max-width: 800px; }

    video { width: 240px; height: 135px; background: #161b22; border-radius: 8px; object-fit: cover; display: block; flex-shrink: 0; }

    #chat-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; }

    #messages { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; height: 320px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

    .msg { max-width: 80%; }
    .msg.mine { align-self: flex-end; }
    .msg .bubble { padding: 8px 12px; border-radius: 12px; font-size: 0.875rem; line-height: 1.4; word-break: break-word; }
    .msg.theirs .bubble { background: #21262d; border-radius: 12px 12px 12px 4px; }
    .msg.mine   .bubble { background: #1f6feb; border-radius: 12px 12px 4px 12px; }
    .msg .meta  { font-size: 0.7rem; color: #8b949e; margin-bottom: 3px; }
    .msg.mine .meta { text-align: right; }

    .system-msg { align-self: center; font-size: 0.75rem; color: #8b949e; font-style: italic; }

    .send-row { display: flex; gap: 8px; }
    .send-row input { flex: 1; }

    #event-log { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; height: 90px; overflow-y: auto; font-family: monospace; font-size: 0.72rem; margin-top: 16px; }
    .log-info    { color: #8be9fd; }
    .log-success { color: #50fa7b; }
    .log-error   { color: #ff5555; }
  </style>
</head>
<body>
  <h1>08 – Chat</h1>
  <p class="subtitle">Real-time text chat between conference participants via PubNub. Requires PubNub keys.</p>

  <div class="config">
    <div><label>Host</label><input id="host" placeholder="your-server.red5.net" /></div>
    <div><label>Room ID</label><input id="room-id" value="testroom" /></div>
    <div><label>User ID / Display Name</label><input id="user-id" placeholder="alice" /></div>
    <div><label>Token (optional)</label><input id="token" /></div>
    <div><label>PubNub Publish Key</label><input id="pn-pub" placeholder="pub-c-…" /></div>
    <div><label>PubNub Subscribe Key</label><input id="pn-sub" placeholder="sub-c-…" /></div>
  </div>

  <div class="row">
    <button id="btn-join">Join Room</button>
    <button id="btn-leave" disabled>Leave Room</button>
  </div>

  <div class="layout">
    <video id="local-video" autoplay playsinline muted></video>

    <div id="chat-panel">
      <div id="messages">
        <div class="system-msg">Chat messages will appear here once you join.</div>
      </div>
      <div class="send-row">
        <input type="text" id="msg-input" placeholder="Type a message…" disabled />
        <button id="btn-send" disabled>Send</button>
      </div>
    </div>
  </div>

  <div id="event-log"></div>

  <script src="https://cdn.jsdelivr.net/npm/red5pro-webrtc-sdk@latest/red5pro-sdk.min.js"></script>
  <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.8.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/red5pro-conference-sdk@latest/red5pro-conference-sdk.min.js"></script>
  <script>
    const { ConferenceClient, ConferenceEvents } = red5proConferenceSdk;
    const $ = id => document.getElementById(id);

    let client = null;
    let localStream = null;
    let myUserId = '';

    function log(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `log-${type}`;
      el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      $('event-log').appendChild(el);
      $('event-log').scrollTop = $('event-log').scrollHeight;
    }

    function addSystemMsg(text) {
      const el = document.createElement('div');
      el.className = 'system-msg';
      el.textContent = text;
      $('messages').appendChild(el);
      $('messages').scrollTop = $('messages').scrollHeight;
    }

    function addMessage(senderId, text, isMine) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${isMine ? 'mine' : 'theirs'}`;
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `${senderId} · ${new Date().toLocaleTimeString()}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(meta);
      wrap.appendChild(bubble);
      $('messages').appendChild(wrap);
      $('messages').scrollTop = $('messages').scrollHeight;
    }

    function sendMessage() {
      const text = $('msg-input').value.trim();
      if (!text || !client) return;
      $('msg-input').value = '';
      addMessage(myUserId, text, true);
    }

    $('btn-join').addEventListener('click', async () => {
      const host   = $('host').value.trim();
      const roomId = $('room-id').value.trim();
      myUserId     = $('user-id').value.trim() || `user-${Date.now()}`;
      const token  = $('token').value.trim();
      const pnPub  = $('pn-pub').value.trim();
      const pnSub  = $('pn-sub').value.trim();

      if (!host) { log('Host is required', 'error'); return; }
      if (!pnPub || !pnSub) { log('PubNub keys are required for chat', 'error'); return; }

      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        $('local-video').srcObject = localStream;

        client = new ConferenceClient({
          host,
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
          pubnubPublishKey:   pnPub,
          pubnubSubscribeKey: pnSub
        });

        client.addEventListener(ConferenceEvents.USER_PUBLISHED, () => {
          log('Publishing — chat ready', 'success');
          $('btn-join').disabled  = true;
          $('btn-leave').disabled = false;
          $('msg-input').disabled = false;
          $('btn-send').disabled  = false;
          addSystemMsg(`You joined as "${myUserId}"`);
        });

        client.addEventListener(ConferenceEvents.CHAT_MESSAGE, e => {
          const msg = e.detail;
          if (!msg) return;
          const sender  = msg.publisher || msg.senderId || msg.uid || 'Unknown';
          const text    = msg.message   || msg.text     || msg.content || JSON.stringify(msg);
          const isMine  = sender === myUserId;
          addMessage(sender, text, isMine);
          log(`Message from ${sender}`);
        });

        client.addEventListener(ConferenceEvents.NEW_PARTICIPANT, e => {
          addSystemMsg(`${e.detail?.uid || 'Someone'} joined the room`);
        });

        client.addEventListener(ConferenceEvents.PARTICIPANT_DISCONNECTED, e => {
          addSystemMsg(`${e.detail?.uid || 'Someone'} left the room`);
        });

        log('Joining room…');
        await client.join(roomId, myUserId, token, 'publisher', localStream, true, true);
      } catch (err) {
        log(`Error: ${err.message}`, 'error');
      }
    });

    $('btn-send').addEventListener('click', sendMessage);

    $('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    $('btn-leave').addEventListener('click', async () => {
      try {
        await client.leave();
        localStream?.getTracks().forEach(t => t.stop());
        $('local-video').srcObject = null;
        client = null; localStream = null;
        $('msg-input').disabled = true;
        $('btn-send').disabled  = true;
        $('btn-join').disabled  = false;
        $('btn-leave').disabled = true;
        addSystemMsg('You left the room');
        log('Left room');
      } catch (err) {
        log(`Leave error: ${err.message}`, 'error');
      }
    });
  </script>
</body>
</html>
